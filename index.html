<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WASM Assembler</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="titlebar"><span>WebAssembly Compiler</span></div>

    <div class="workspace">
      <div class="editor-row">
        <div class="activity-bar">
          <div class="activity-btn" id="activityEnv" title="Env Imports">⚙</div>
          <div class="activity-btn" id="activityDocs" title="Documentation">📄</div>
        </div>

        <div class="side-panel collapsed" id="sidePanel" style="width: 260px">
          <div class="side-panel-header">
            <span class="side-panel-title">Env Imports</span>
            <span class="side-panel-add" title="Add import">+</span>
          </div>
          <div class="env-list" id="envList"></div>

          <div class="env-form hidden" id="envForm">
            <div class="env-form-title" id="envFormTitle">New Import</div>

            <div class="env-field">
              <span class="env-label">Name</span>
              <input class="env-input" id="envName" placeholder="e.g. pow" />
            </div>

            <div class="env-field">
              <span class="env-label">Signature</span>
              <input class="env-input" id="envSig" placeholder="i32 i32 => i32" />
            </div>

            <div class="env-field">
              <span class="env-label">JS Body</span>
              <textarea class="env-textarea" id="envBody"></textarea>
            </div>

            <div class="env-form-btns">
              <button class="env-btn env-btn-cancel">Cancel</button>
              <button class="env-btn env-btn-primary">Save</button>
            </div>
          </div>
        </div>

        <div class="resize-handle" id="resizeEnv"></div>

        <div class="docs-panel collapsed" id="docsPanel" style="width: 280px">
          <div class="docs-header">
            <span class="docs-back-btn" id="docsBack">‹</span>
            <span class="docs-header-title" id="docsHeaderTitle">Documentation</span>
          </div>
          <div class="docs-file-list" id="docsFileList"></div>
          <div class="docs-viewer md" id="docsViewer"></div>
        </div>

        <div class="resize-handle" id="resizeDocs"></div>

        <div class="line-numbers" id="lineNumbers"></div>

        <div class="editor-wrap" id="editorWrap">
          <textarea id="code"></textarea>
        </div>

        <div class="minimap" id="minimapContainer">
          <canvas id="minimapCanvas"></canvas>
          <div class="minimap-viewport" id="minimapViewport"></div>
        </div>
      </div>

      <div class="panel" id="panel">
        <div class="terminal-output" id="termOutput"></div>
        <input type="text" id="termInput" />
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
